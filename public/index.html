    <!-- Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <title>Usaidizi Pap! - Instant First Aid & Emergency Response</title>
    
    <style>
      /* Global font and reset */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #f8f9fa;
      }
      
      code {
        font-family: source-code-pro, Menlo, Monaco, Consolas, 'Courier New', monospace;
      }
      
      /* Smooth scrolling */
      html {
        scroll-behavior: smooth;
      }
      
      /* Selection color */
      ::selection {
        background: #dc3545;
        color: white;
      }
      
      /* Scrollbar styling */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      
      ::-webkit-scrollbar-track {
        background: #f1f1f1;
        border-radius: 4px;
      }
      
      ::-webkit-scrollbar-thumb {
        background: #dc3545;
        border-radius: 4px;
      }
      
      ::-webkit-scrollbar-thumb:hover {
        background: #c82333;
      }
    </style>

  <body>
    <noscript>
      <div style="text-align: center; padding: 50px; font-family: 'Inter', sans-serif;">
        <h1 style="color: #dc3545;">⚠️ JavaScript Required</h1>
        <p style="color: #6c757d;">Usaidizi Pap! requires JavaScript to run. Please enable JavaScript in your browser settings.</p>
        <button style="margin-top: 20px; padding: 12px 24px; background: #dc3545; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer;" onclick="location.reload()">Refresh</button>
      </div>
    </noscript>
    
    <div id="root"></div>
    
    <!-- Bootstrap JS (for dropdowns, modals) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
